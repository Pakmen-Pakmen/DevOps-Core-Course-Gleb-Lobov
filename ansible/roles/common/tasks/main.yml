- name: Update apt cache
  apt:
    update_cache: yes
  become: true

- name: Install required packages
  apt:
    name:
      - docker.io
      - python3-pip
      - ufw
    state: present
  become: true

- name: Install Docker SDK for Python
  pip:
    name: docker

- name: Enable and start Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Allow SSH
  ufw:
    rule: allow
    port: 22

- name: Allow app port
  ufw:
    rule: allow
    port: "{{ app_port }}"

- name: Enable UFW
  ufw:
    state: enabled
