- name: System preparation block
  block:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - python3-pip
          - ufw
          - curl
          - git
        state: present

  become: true
  tags:
    - common
    - packages


- name: Firewall configuration block
  block:

    - name: Allow SSH
      ufw:
        rule: allow
        port: 22

    - name: Allow app port
      ufw:
        rule: allow
        port: "{{ app_port }}"

    - name: Enable UFW
      ufw:
        state: enabled

  become: true
  tags:
    - firewall
    - common
