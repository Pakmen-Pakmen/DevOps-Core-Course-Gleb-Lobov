- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - software-properties-common
    state: present

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Install Python Docker SDK
  apt:
    name: python3-pip
    state: present
    update_cache: yes

- name: Install docker SDK for Python
  pip:
    name: docker
    executable: pip3
