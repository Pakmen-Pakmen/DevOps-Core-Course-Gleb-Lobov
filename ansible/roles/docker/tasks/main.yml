- name: Docker installation block
  block:

    - name: Install Docker package
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Install Docker SDK for Python
      pip:
        name: docker
        executable: pip3

  become: true
  tags:
    - docker_install
    - docker


- name: Docker configuration block
  block:

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

  become: true
  tags:
    - docker_config
    - docker
